<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment | Mwase & Co.</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>Mwase & Co. Advocates</h1>
                <p>Jinja, Uganda</p>
            </div>
            <nav>
                <ul class="nav-tabs">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="services.html">Practice Areas</a></li>
                    <li><a href="attorney.html">Advocate</a></li>
                    <li><a href="appointment.html" class="active">Appointment</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="page-title">
            <div class="container">
                <h2>Request an Appointment</h2>
                <p>Fill the form and we will confirm your slot within 24 hours</p>
            </div>
        </section>

        <section class="appointment-form">
            <div class="container">
                <form id="appointmentForm">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" required>

                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone">

                    <label for="date">Preferred Date *</label>
                    <input type="date" id="date" name="date" required>

                    <label for="time">Preferred Time</label>
                    <input type="time" id="time" name="time">

                    <label for="message">Brief Description of Legal Matter *</label>
                    <textarea id="message" name="message" rows="4" required></textarea>

                    <button type="submit" class="btn">Submit Request</button>
                </form>
                <div id="formFeedback" class="feedback"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Mwase & Co. Advocates. Jinja, Uganda.</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
